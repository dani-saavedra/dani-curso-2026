apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ejemplo
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /lavaca(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ejemplo
                port:
                  number: 9999